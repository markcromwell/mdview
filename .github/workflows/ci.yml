name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python -m pytest scripts/ -q   # whole scripts/ dir — feature + auth-enforcement tests must run in CI

  # Standard SOV Program boot gate (Option A): build the REAL image and prove it serves /health, where
  # the program's own deps live. A non-booting image fails here and is blocked at merge (required check).
  boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          if [ ! -f Dockerfile ]; then echo "no Dockerfile (library) — skipping boot gate"; exit 0; fi
          docker build -t boot-test:ci .
      - name: Migrations idempotency (apply twice)
        run: |
          if [ ! -d alembic ]; then echo "no alembic — skipping"; exit 0; fi
          docker run --rm -e DATABASE_URL=sqlite:////tmp/ci.db --entrypoint sh boot-test:ci \
            -c "alembic upgrade head && alembic upgrade head && alembic current"
      - name: Boot + /health
        run: |
          if [ ! -f Dockerfile ]; then exit 0; fi
          docker run -d --name boot -e DATABASE_URL=sqlite:////tmp/ci.db -p 8000:8000 boot-test:ci
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health | grep -q '"status":"ok"'; then ok=1; break; fi
            sleep 2
          done
          docker logs boot || true
          docker rm -f boot || true
          if [ "$ok" != "1" ]; then echo "BOOT/HEALTH FAILED"; exit 1; fi
          echo "boot gate: /health OK"

  # Quality self-check (lint / types / security / deps / coverage). ADVISORY — every step is
  # continue-on-error so a fresh scaffold is never born-failing, but they RUN (the scaffold gitignored
  # .ruff_cache/.mypy_cache/.coverage yet ran none = tooling theater; this makes them real). Promote
  # ruff + bandit to blocking (drop their continue-on-error) once a scaffolded program is confirmed clean.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy bandit pip-audit pytest-cov
      - name: install project (best-effort; ruff/bandit need no deps, mypy/coverage are advisory)
        continue-on-error: true
        run: pip install -e .
      - name: ruff (lint)
        continue-on-error: true
        run: ruff check .
      - name: bandit (security)
        continue-on-error: true
        run: bandit -q -r . -x ./scripts,./tests
      - name: mypy (types)
        continue-on-error: true
        run: mypy app main.py --ignore-missing-imports
      - name: pip-audit (dependency CVEs)
        continue-on-error: true
        run: pip-audit
      - name: coverage
        continue-on-error: true
        run: python -m pytest scripts/ -q --cov=. --cov-report=term-missing
